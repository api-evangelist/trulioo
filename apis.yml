apis:
- aid: trulioo:trulioo-verifications-api
  name: Trulioo Verifications API
  description: Normalized KYC / electronic identity verification API. Submit a Verify
    request with normalized PersonInfo, Communication, Location, NationalIds, and
    Documents fields and Trulioo's GlobalGateway routes the request across local data
    sources in 195+ countries. Companion endpoints retrieve transaction records, statuses,
    partial results, and downloadable document images.
  humanURL: https://developer.trulioo.com/reference/identity-verifications
