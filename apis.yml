aid: trulioo
url: https://raw.githubusercontent.com/api-evangelist/trulioo/refs/heads/main/apis.yml
name: Trulioo
kind: company
description: Trulioo is a Vancouver-based global identity verification platform that
  operates GlobalGateway, a single-API gateway into 450+ data sources across 195+
  countries for person verification (KYC), business verification (KYB), watchlist
  and PEP screening, identity document verification (DocV), biometric face match,
  and fraud-intelligence risk scoring. The Trulioo Platform layers Workflow Studio
  (hosted and low-code), reusable end-client profiles, event-driven webhooks, native
  mobile and web capture SDKs, and an MCP server on top of the underlying Verifications
  and Business APIs.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Identity Verification
- KYC
- KYB
- AML
- Watchlist Screening
- Biometrics
- Document Verification
- Fraud Prevention
- Compliance
- Global Identity
created: '2026-05-25'
modified: '2026-05-25'
